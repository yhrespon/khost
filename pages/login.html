<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Krinyx | Connexion</title>
  <script>(function(){
    var t = localStorage.getItem("krinyx_theme") || "dark";
    document.documentElement.setAttribute("data-theme", t);
    var l = localStorage.getItem("krinyx_lang") || "fr";
    document.documentElement.setAttribute("lang", l);
  })()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/theme_/theme.css"/>
  <style>
    html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;}

    .auth-page{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:calc(48px + var(--s5)) var(--s4) var(--s5);
      position: relative;
    }
    .auth-card{
      width:100%;max-width:420px;
      background:var(--surface);
      border:1px solid var(--border-2);
      border-radius:var(--r-xl);
      padding:var(--s6) var(--s5);
      box-shadow:var(--shadow-lg);
      animation:fadeUp .3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

    /* Logo + welcome */
    .auth-logo-wrap{text-align:center;margin-bottom:var(--s5);}
    .auth-logo{
      width:72px;height:72px;border-radius:var(--r-lg);
      object-fit:cover;margin:0 auto var(--s3);
      display:block;
      border:2px solid var(--border-2);
    }
    .auth-logo-fallback{
      width:72px;height:72px;border-radius:var(--r-lg);
      background:var(--text);color:var(--text-inv);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto var(--s3);
      font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;
    }
    .auth-brand{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:.18em;text-transform:uppercase;}
    .auth-welcome{font-size:.88rem;color:var(--text-3);line-height:1.5;}

    .auth-divider{height:1px;background:var(--border-2);margin:var(--s4) 0;}

    /* Form */
    .form-group{margin-bottom:var(--s3);}
    .form-label{font-size:.75rem;font-weight:600;color:var(--text-2);display:block;margin-bottom:6px;letter-spacing:.02em;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:var(--s3);top:50%;transform:translateY(-50%);color:var(--text-3);display:flex;}
    .form-input{
      width:100%;padding:.65rem var(--s3);
      background:var(--bg-2);border:1px solid var(--border-2);
      border-radius:var(--r-md);font-size:.88rem;color:var(--text);
      outline:none;transition:border-color .15s;font-family:'DM Sans',sans-serif;
    }
    .form-input.has-icon{padding-left:2.5rem;}
    .form-input:focus{border-color:var(--text);}
    .form-input.invalid{border-color:var(--red);}

    /* Alert */
    .alert{display:none;padding:var(--s3) var(--s4);border-radius:var(--r-md);font-size:.82rem;font-weight:500;margin-bottom:var(--s3);}
    .alert.show{display:block;}
    .alert-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);}
    .alert-success{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--green);}

    /* Forgot + links */
    .auth-links{display:flex;align-items:center;justify-content:space-between;margin-top:var(--s2);font-size:.78rem;}
    .auth-link{color:var(--text-3);text-decoration:none;transition:color .15s;}
    .auth-link:hover{color:var(--text-2);}

    /* Footer */
    .auth-footer{text-align:center;margin-top:var(--s4);font-size:.8rem;color:var(--text-3);}
    .auth-footer a{color:var(--text-2);text-decoration:none;font-weight:600;}
    .auth-footer a:hover{color:var(--text);}

    /* Status */
    .status-dot{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text-3);font-family:'DM Mono',monospace;margin-bottom:var(--s4);}
    .status-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px rgba(34,197,94,.2);animation:pulse 2s infinite;flex-shrink:0;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* Role overlay */
    @keyframes mIn{from{opacity:0;transform:scale(.95) translateY(8px)}}
    
    /* Footer signature */
    .signature-footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-3);
      opacity: 0.7;
      letter-spacing: 0.5px;
      font-family: 'DM Sans', sans-serif;
    }
    .signature-footer span {
      background: var(--surface);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-2);
      display: inline-block;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
<script src="/js/ui.js"></script>

<script>injectTopbar('/login');</script>

<!-- Role overlay admin -->
<div id="role-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:300;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:var(--surface);border:1px solid var(--border-2);border-radius:16px;padding:2rem;width:100%;max-width:380px;animation:mIn .25s cubic-bezier(.16,1,.3,1);">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <img src="/logo.jpg" alt="Krinyx" style="width:48px;height:48px;border-radius:10px;object-fit:cover;margin:0 auto var(--s2);display:block;" onerror="this.style.display='none'"/>
      <div style="font-size:1rem;font-weight:800;color:var(--text);font-family:'Syne',sans-serif;">Compte administrateur</div>
      <div style="font-size:.78rem;color:var(--text-3);margin-top:4px;">Comment souhaitez-vous vous connecter ?</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <button onclick="chooseRole('user')" style="background:var(--bg-2);border:1px solid var(--border-2);border-radius:10px;padding:1rem;cursor:pointer;text-align:left;color:var(--text);transition:all .15s;" onmouseover="this.style.borderColor='var(--text-3)'" onmouseout="this.style.borderColor='var(--border-2)'">
        <div style="font-weight:700;font-size:.88rem;">Espace Utilisateur</div>
        <div style="font-size:.72rem;color:var(--text-3);margin-top:2px;">Dashboard classique — bots, panels, crédits</div>
      </button>
      <button onclick="chooseRole('admin')" style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:1rem;cursor:pointer;text-align:left;color:var(--text);transition:all .15s;" onmouseover="this.style.borderColor='rgba(239,68,68,.5)'" onmouseout="this.style.borderColor='rgba(239,68,68,.25)'">
        <div style="font-weight:700;font-size:.88rem;color:var(--red);">Espace Administrateur</div>
        <div style="font-size:.72rem;color:var(--text-3);margin-top:2px;">Contrôle total — membres, stats, outils</div>
      </button>
    </div>
  </div>
</div>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo + Welcome -->
    <div class="auth-logo-wrap">
      <img src="/logo.jpg" alt="Krinyx" class="auth-logo"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="auth-logo-fallback" style="display:none;"><img src="/logo.jpg" alt="Krinyx" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" onerror="this.style.display='none'"/></div>
      <div class="auth-brand">Krinyx</div>
      <div class="auth-welcome" data-i18n="login.sub">Bienvenue ! Connectez-vous pour accéder à votre espace.</div>
    </div>

    <!-- Status -->
    <div class="status-dot" data-i18n="login.status">Système en ligne</div>

    <!-- Alert -->
    <div class="alert" id="alert" role="alert"></div>

    <!-- Form -->
    <form id="loginForm" autocomplete="off" novalidate onsubmit="return false;">

      <div class="form-group">
        <label class="form-label" for="email" data-i18n="login.email">Adresse email</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </span>
          <input type="email" id="email" class="form-input has-icon"
                 data-i18n-ph="login.email" placeholder="email@exemple.com" autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password" data-i18n="login.password">Mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="password" class="form-input has-icon"
                 placeholder="••••••••" autocomplete="current-password"
                 style="padding-right:2.6rem;"/>
          <button type="button" id="togglePw" style="position:absolute;right:var(--s3);top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);padding:2px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="auth-links" style="margin-bottom:var(--s4);">
        <span></span>
        <a class="auth-link" href="/forgot" data-i18n="login.forgot">Mot de passe oublié ?</a>
      </div>

      <button type="button" class="btn btn-primary btn-full" id="btnLogin">
        <span id="btnLoginText" data-i18n="login.btn">Se connecter</span>
      </button>

    </form>

    <div class="auth-divider"></div>

    <div class="auth-footer">
      <span data-i18n="login.no-account">Pas encore de compte ?</span>
      <a href="/register" data-i18n="login.register"> Créer un compte</a>
    </div>

  </div>
  
  <!-- Signature -->
  <div class="signature-footer">
    <span>Dev by Knut & Raizel</span>
  </div>
</div>

<script>
var _pendingUser = null;

function chooseRole(role) {
  if (!_pendingUser) return;
  localStorage.setItem('krinyx_session', JSON.stringify(_pendingUser));
  
  document.getElementById('role-overlay').style.display = 'none';
  window.location.replace(role === 'admin' ? '/admindashboard' : '/dashboard');
}

document.addEventListener('DOMContentLoaded', () => {
  ThemeManager.init();
  i18n.init();

  // DÉSACTIVATION COMPLÈTE DE LA REDIRECTION AUTOMATIQUE
  // On ne vérifie plus la session au chargement pour éviter les boucles
  
  // On garde juste un nettoyage silencieux si session invalide
  try {
    var raw = localStorage.getItem('krinyx_session');
    if (raw) {
      var s = JSON.parse(raw);
      // Session invalide ? On nettoie sans rediriger
      if (!s || !s.id || !s.email || typeof s.email !== 'string' || !s.email.includes('@')) {
        localStorage.removeItem('krinyx_session');
        localStorage.removeItem('krinyx_balance');
      }
    }
  } catch(e) {
    localStorage.removeItem('krinyx_session');
  }

  var pwInput  = document.getElementById('password');
  var togglePw = document.getElementById('togglePw');
  togglePw.addEventListener('click', () => {
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  });

  function showAlert(type, msg) {
    var a = document.getElementById('alert');
    a.className = 'alert alert-' + type + ' show';
    a.textContent = msg;
  }
  function clearAlert() {
    var a = document.getElementById('alert');
    a.className = 'alert'; a.textContent = '';
  }

  // Soumettre au clic ET à la touche Enter
  function doLogin() {
    clearAlert();
    var btn      = document.getElementById('btnLogin');
    var email    = document.getElementById('email').value.trim();
    var password = pwInput.value;

    if (!email || !email.includes('@'))
      return showAlert('error', i18n.t('login.err.email'));
    if (!password)
      return showAlert('error', i18n.t('login.err.pw'));

    btn.disabled = true;
    document.getElementById('btnLoginText').textContent = i18n.t('login.loading');

    fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function(res) { return res.json().then(function(d){ return {ok:res.ok, d:d}; }); })
    .then(function(r) {
      if (r.ok && r.d.success) {
        var user = r.d.user;
        var isAdmin = user.isadmin || user.isAdmin || user.role === 'admin';
        showAlert('success', i18n.t('login.success').replace('Connexion réussie ! Redirection…', 'Bienvenue ' + (user.username || '') + ' !'));
        
        if (isAdmin) {
          _pendingUser = user;
          btn.disabled = false;
          document.getElementById('btnLoginText').textContent = i18n.t('login.btn');
          document.getElementById('role-overlay').style.display = 'flex';
        } else {
          localStorage.setItem('krinyx_session', JSON.stringify(user));
          
          
          // REDIRECTION VERS /dashboard
          setTimeout(function(){ 
            window.location.replace('/dashboard'); 
          }, 700);
        }
      } else {
        showAlert('error', r.d.message || i18n.t('login.err.invalid'));
        btn.disabled = false;
        document.getElementById('btnLoginText').textContent = i18n.t('login.btn');
        pwInput.value = '';
      }
    })
    .catch(function() {
      showAlert('error', 'Erreur de connexion. Réessayez.');
      btn.disabled = false;
      document.getElementById('btnLoginText').textContent = i18n.t('login.btn');
    });
  }

  document.getElementById('btnLogin').addEventListener('click', doLogin);

  // Enter dans les champs → login
  document.getElementById('email').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('password').focus(); });
  document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
});
</script>
</body>
</html>
